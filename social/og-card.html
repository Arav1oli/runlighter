*{box-sizing:border-box}html,body{width:1200px;height:630px;margin:0;overflow:hidden}body{position:relative;background:#08090a;color:#fff;font-family:Inter,sans-serif}body::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 22%,rgba(125,211,252,.16),transparent 28%),radial-gradient(circle at 64% 70%,rgba(228,242,34,.1),transparent 25%),linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:auto,auto,64px 64px,64px 64px}.grid-floor{position:absolute;width:720px;height:380px;right:-80px;bottom:-220px;border:1px solid rgba(228,242,34,.22);background:repeating-linear-gradient(90deg,rgba(228,242,34,.13) 0 1px,transparent 1px 84px),repeating-linear-gradient(0deg,rgba(228,242,34,.09) 0 1px,transparent 1px 60px);transform:perspective(650px) rotateX(61deg)}.content{position:relative;height:100%;padding:64px 72px;display:flex;flex-direction:column;justify-content:space-between}.brand{font:900 24px/1 Archivo;letter-spacing:.04em}.brand span{color:#e4f222}.eyebrow{color:#e4f222;font-size:12px;font-weight:800;letter-spacing:.17em;text-transform:uppercase}.main{display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:end}.headline{font:900 70px/.92 Archivo;letter-spacing:-.055em;max-width:760px}.headline span{color:#e4f222}.workflow{border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:22px;background:rgba(255,255,255,.045);box-shadow:0 30px 80px rgba(0,0,0,.4)}.bar{display:flex;justify-content:space-between;color:#8a8f98;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.12)}.bar b{color:#e4f222}.node{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;font-weight:700}.node:last-child{border:0}.node i{width:10px;height:10px;border-radius:50%;background:#e4f222;box-shadow:0 0 14px rgba(228,2
