<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:Inter,Arial,sans-serif;background:#344137;color:#F3F0E8}.asset{width:100vw;height:100vh;position:relative;overflow:hidden}.wordmark{font-family:Archivo,Arial,sans-serif;font-weight:900;letter-spacing:.08em}.slash,.accent{color:#A7B5A5}.eyebrow{font-size:18px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#D8E1D6}.headline{font-family:Archivo,Arial,sans-serif;font-weight:900;letter-spacing:-.045em;line-height:.98;text-wrap:balance}.cover,.og{background:#344137}.cover::before,.og::before,.story::before{content:"";position:absolute;inset:0;background-image:linear-gradient(90deg,rgba(52,65,55,.99) 0%,rgba(52,65,55,.94) 43%,rgba(52,65,55,.34) 72%,rgba(52,65,55,.12) 100%),url('../assets/quietly-completed-overnight.jpg');background-size:cover;background-position:center}.cover .content,.og .content{position:absolute;left:7%;top:50%;transform:translateY(-50%);width:55%;z-index:1}.cover .headline{font-size:min(7.2vw,84px);margin:20px 0 24px}.cover .sub,.og .sub{font-size:22px;color:rgba(243,240,232,.8)}.cover .wordmark,.og .wordmark{font-size:22px}.og .content{left:6%;width:59%}.og .headline{font-size:min(7.4vw,76px);margin:20px 0 24px}.profile{background:#587664;display:flex;align-items:center;justify-content:center}.profile::after{content:"";position:absolute;width:36%;height:125%;background:#F3F0E8;transform:rotate(24deg);border-radius:999px}.profile .initials{position:relative;z-index:2;font:900 25vw/1 Arial,sans-serif;color:#344137;letter-spacing:-.09em;transform:translateX(-4%)}.square{background:#F3F0E8;color:#344137;padding:7.5%;display:flex;flex-direction:column;justify-content:space-between}.square .wordmark{font-size:2.4vw}.square .headline{font-size:8.6vw;max-width:88%;margin:0}.square .footer{display:flex;justify-content:space-between;align-items:end;font-size:1.8vw;color:#6F786F;font-weight:600}.square .rule{height:1.2vw;background:#587664;width:22%;margin-bottom:3.5%}.story::before{background-image:linear-gradient(180deg,rgba(52,65,55,.22) 0%,rgba(52,65,55,.28) 37%,rgba(52,65,55,.94) 76%,#344137 100%),url('../assets/quietly-completed-overnight.jpg');background-position:center}.story .top{position:absolute;top:5%;left:7%;right:7%;display:flex;justify-content:space-between;z-index:1;font-size:3vw}.story .content{position:absolute;z-index:1;left:7%;right:7%;bottom:7%}.story .headline{font-size:9.5vw;margin:0 0 5%}.story .cta{display:inline-block;background:#F3F0E8;color:#344137;padding:2.8% 4.5%;border-radius:999px;font-size:3.7vw;font-weight:800}.story .sub{font-size:2.8vw;color:rgba(243,240,232,.76);margin-top:4%}
.cover::before{background-image:radial-gradient(circle at 78% 22%,rgba(167,181,165,.28),transparent 25%),radial-gradient(circle at 90% 82%,rgba(88,118,100,.55),transparent 30%),linear-gradient(rgba(243,240,232,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(243,240,232,.055) 1px,transparent 1px);background-size:auto,auto,72px 72px,72px 72px}
.cover .sub{padding-left:18px}
.post{background:#F3F0E8;color:#344137;padding:6.5%;display:grid;grid-template-rows:auto 1fr auto;gap:5%}.post .wordmark{font-size:2.15vw}.post .headline{font-size:7.2vw;margin:0;max-width:88%}.post-top,.post-bottom{display:flex;align-items:center;justify-content:space-between}.post-kicker,.post-bottom{color:#667267;font-size:1.65vw;font-weight:700;letter-spacing:.1em;text-transform:uppercase}.post-main{min-height:0;display:grid;grid-template-rows:auto 1fr;gap:5%}.post-visual{position:relative;min-height:0;border:1px solid rgba(52,65,55,.18);border-radius:4vw;background:linear-gradient(145deg,#E5E9DE,#D2DBCE);overflow:hidden}.manual-grid{position:absolute;inset:10%;display:grid;grid-template-columns:1fr .6fr 1fr;grid-template-rows:repeat(3,1fr);gap:4%}.manual-card{position:relative;border:1px solid rgba(52,65,55,.18);border-radius:2vw;background:rgba(251,248,241,.86);box-shadow:0 1.8vw 4vw rgba(52,65,55,.08)}.manual-card::before,.manual-card::after{content:"";position:absolute;left:12%;right:12%;height:.8vw;border-radius:999px;background:rgba(52,65,55,.18)}.manual-card::before{top:30%;box-shadow:0 2vw 0 rgba(52,65,55,.1)}.manual-card::after{bottom:22%;right:42%;background:#587664}.manual-card:nth-child(1){grid-column:1;grid-row:1}.manual-card:nth-child(2){grid-column:3;grid-row:1}.manual-card:nth-child(3){grid-column:1;grid-row:3}.manual-card:nth-child(4){grid-column:3;grid-row:3}.manual-hub{grid-column:2;grid-row:2;display:grid;place-items:center;border-radius:50%;background:#587664;color:#F3F0E8;font:800 2.2vw/1 Archivo,sans-serif;box-shadow:0 0 0 1.4vw rgba(88,118,100,.12)}.manual-line{position:absolute;height:.35vw;background:rgba(88,118,100,.55);transform-origin:left center}.manual-line.a{left:29%;top:30%;width:20%;transform:rotate(28deg)}.manual-line.b{left:51%;top:50%;width:21%;transform:rotate(-28deg)}.manual-line.c{left:29%;top:70%;width:20%;transform:rotate(-28deg)}.manual-line.d{left:51%;top:50%;width:21%;transform:rotate(28deg)}
.method-visual{display:grid;grid-template-columns:repeat(3,1fr);gap:2.2%;align-items:center;padding:6.5%}.method-step{position:relative;min-height:67%;padding:11% 9%;border-radius:2.5vw;background:rgba(251,248,241,.84);border:1px solid rgba(52,65,55,.17);display:flex;flex-direction:column}.method-step:nth-child(2){transform:translateY(-7%);background:#587664;color:#F3F0E8}.method-step .num{font:700 1.5vw/1 Archivo,sans-serif;letter-spacing:.12em;color:#7E897F}.method-step:nth-child(2) .num{color:#D7E0D3}.method-step strong{margin-top:auto;font:800 3vw/1 Archivo,sans-serif;letter-spacing:-.04em}.method-step small{margin-top:8%;font-size:1.5vw;line-height:1.35;color:#6F786F}.method-step:nth-child(2) small{color:#D7E0D3}.method-arrow{position:absolute;z-index:2;top:49%;width:4.4vw;height:4.4vw;border-radius:50%;background:#344137;color:#F3F0E8;display:grid;place-items:center;font-size:2vw}.method-arrow.one{left:31.1%}.method-arrow.two{right:31.1%}
</style>
</head>
<body>
<div id="asset" class="asset"></div>
<script>
const type=new URLSearchParams(location.search).get('asset')||'cover';
const el=document.getElementById('asset');
const mark='<span class="wordmark">RUN<span class="slash"> / </span>LIGHTER</span>';
if(type==='profile'){
  el.className='asset profile';el.innerHTML='<div class="initials">RL</div>';
}else if(type==='square'){
  el.className='asset square';el.innerHTML=`${mark}<div><div class="rule"></div><div class="headline">Your business should not need you <span class="accent">everywhere.</span></div></div><div class="footer"><span>Practical automation</span><span>Sydney, Australia</span></div>`;
}else if(type==='story'){
  el.className='asset story';el.innerHTML=`<div class="top">${mark}<span>Sydney</span></div><div class="content"><div class="headline">Find the work your team should not <span class="accent">repeat.</span></div><span class="cta">Book an on-site review</span><div class="sub">Practical automation for growing businesses.</div></div>`;
}else if(type==='og'){
  el.className='asset og';el.innerHTML=`<div class="content">${mark}<div class="headline">Your business should not need you <span class="accent">everywhere.</span></div><div class="sub">Practical automation for growing Sydney businesses.</div></div>`;
}else if(type==='manual'){
  el.className='asset post';el.innerHTML=`<div class="post-top">${mark}<span class="post-kicker">Less repeated work</span></div><div class="post-main"><div class="headline">Still running everything by hand?</div><div class="post-visual"><div class="manual-grid"><div class="manual-card"></div><div class="manual-card"></div><div class="manual-card"></div><div class="manual-card"></div><div class="manual-hub">RL</div><i class="manual-line a"></i><i class="manual-line b"></i><i class="manual-line c"></i><i class="manual-line d"></i></div></div></div><div class="post-bottom"><span>Practical automation</span><span>Sydney</span></div>`;
}else if(type==='method'){
  el.className='asset post';el.innerHTML=`<div class="post-top">${mark}<span class="post-kicker">A practical start</span></div><div class="post-main"><div class="headline">Start with the work that hurts most.</div><div class="post-visual method-visual"><div class="method-step"><span class="num">01</span><strong>Map</strong><small>See how work really moves.</small></div><span class="method-arrow one">→</span><div class="method-step"><span class="num">02</span><strong>Choose</strong><small>Find the strongest opportunity.</small></div><span class="method-arrow two">→</span><div class="method-step"><span class="num">03</span><strong>Build</strong><small>Prove one useful process.</small></div></div></div><div class="post-bottom"><span>Practical automation</span><span>Sydney</span></div>`;
}else{
  el.className='asset cover';el.innerHTML=`<div class="content">${mark}<div class="headline">Your business should not need you <span class="accent">everywhere.</span></div><div class="sub">Practical automation for growing businesses · Sydney</div></div>`;
}
</script>
</body>
</html>
