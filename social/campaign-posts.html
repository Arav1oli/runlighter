<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--oat:#f3efe5;--paper:#fbf8f1;--moss:#344137;--eucalyptus:#587664;--sage:#718069;--sage-wash:#dfe4d7;--stone:#d8d1c4;--line:rgba(52,65,55,.2)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{font-family:Archivo,Arial,sans-serif}.post{position:relative;width:100vw;height:100vh;padding:6.5%;display:grid;grid-template-rows:auto auto 1fr;gap:5%;overflow:hidden}.post.light{background:var(--oat);color:var(--moss)}.post.dark{background:var(--moss);color:var(--paper)}.post.sage{background:var(--sage-wash);color:var(--moss)}
.top{display:flex;align-items:center;justify-content:space-between}.mark{display:grid;place-items:center;width:5.2vw;height:5.2vw;border-radius:1.45vw;background:var(--eucalyptus);color:var(--paper);font:900 2vw/1 Archivo,sans-serif;letter-spacing:-.08em}.dark .mark{background:var(--paper);color:var(--moss)}.index{font-size:1.5vw;letter-spacing:.16em;opacity:.58}.headline{max-width:94%;font:900 7.5vw/.96 Archivo,sans-serif;letter-spacing:-.052em;text-wrap:balance}.visual{position:relative;min-height:0;border:1px solid var(--line);border-radius:4vw;overflow:hidden;background:rgba(251,248,241,.55)}.dark .visual{border-color:rgba(251,248,241,.18);background:rgba(251,248,241,.06)}
.lane{position:absolute;left:10%;right:10%;height:1.1vw;border-radius:999px;background:rgba(52,65,55,.15)}.dark .lane{background:rgba(251,248,241,.16)}.lane.one{top:24%}.lane.two{top:50%}.lane.three{top:76%}.runner{position:absolute;width:5.8vw;height:5.8vw;border-radius:50%;background:var(--eucalyptus);box-shadow:0 0 0 1.3vw rgba(88,118,100,.15)}.runner.a{top:18.5%;right:15%}.runner.b{top:44.5%;right:33%}.runner.c{top:70.5%;left:13%;background:transparent;border:.8vw solid var(--sage);box-shadow:none}
.capacity{position:absolute;inset:10%;display:grid;grid-template-columns:1.2fr .8fr;gap:7%;align-items:center}.task-stack{position:relative;height:78%}.task{position:absolute;left:0;width:100%;height:28%;border-radius:2vw;background:var(--paper);border:1px solid var(--line);box-shadow:0 1.8vw 4vw rgba(52,65,55,.08)}.task:nth-child(1){top:0;transform:rotate(-3deg)}.task:nth-child(2){top:25%;left:5%;transform:rotate(2deg)}.task:nth-child(3){top:50%;left:-2%;transform:rotate(-1deg)}.task::before{content:"";position:absolute;left:10%;right:10%;top:32%;height:.75vw;border-radius:999px;background:rgba(52,65,55,.18);box-shadow:0 2vw 0 rgba(52,65,55,.1)}.focus{aspect-ratio:1;border-radius:50%;display:grid;place-items:center;background:var(--eucalyptus);box-shadow:0 0 0 2.2vw rgba(88,118,100,.13)}.focus::before{content:"";width:36%;height:36%;border:1vw solid var(--paper);border-radius:50%}
.timeline{position:absolute;left:10%;right:10%;top:50%;height:1vw;transform:translateY(-50%);border-radius:999px;background:rgba(52,65,55,.16)}.dark .timeline{background:rgba(251,248,241,.16)}.time-dot{position:absolute;top:50%;width:6vw;height:6vw;transform:translate(-50%,-50%);border-radius:50%;background:var(--stone);border:1vw solid var(--paper)}.time-dot:nth-child(1){left:10%;opacity:.42}.time-dot:nth-child(2){left:37%;opacity:.63}.time-dot:nth-child(3){left:64%;opacity:.82}.time-dot:nth-child(4){left:90%;background:var(--eucalyptus);box-shadow:0 0 0 1.5vw rgba(88,118,100,.14)}
.crm-hub{position:absolute;left:50%;top:50%;width:17vw;height:17vw;transform:translate(-50%,-50%);border-radius:50%;background:var(--eucalyptus);box-shadow:0 0 0 2.4vw rgba(88,118,100,.14)}.crm-hub::before{content:"";position:absolute;inset:29%;border:.9vw solid var(--paper);border-radius:1.2vw}.orbit{position:absolute;left:50%;top:50%;width:46vw;height:46vw;transform:translate(-50%,-50%);border:1vw dashed rgba(88,118,100,.45);border-radius:50%}.orbit::before,.orbit::after{content:"";position:absolute;width:7vw;height:7vw;border-radius:50%;background:var(--paper);border:1px solid var(--line);box-shadow:0 1vw 3vw rgba(52,65,55,.08)}.orbit::before{left:5%;top:12%}.orbit::after{right:5%;bottom:12%}.orbit-arrow{position:absolute;left:50%;top:7%;transform:translateX(-50%);font:900 5vw/1 Arial,sans-serif;color:var(--eucalyptus)}
.systems{position:absolute;inset:11%;display:grid;grid-template-columns:repeat(3,1fr);gap:7%;align-items:center}.system{position:relative;height:48%;border-radius:2.2vw;background:var(--paper);border:1px solid var(--line);box-shadow:0 1.6vw 4vw rgba(52,65,55,.08)}.system::before{content:"";position:absolute;left:14%;right:14%;top:28%;height:.8vw;border-radius:999px;background:rgba(52,65,55,.18);box-shadow:0 2vw 0 rgba(52,65,55,.1),0 4vw 0 var(--eucalyptus)}.copy-arrow{position:absolute;top:50%;z-index:2;width:5vw;height:5vw;transform:translate(-50%,-50%);display:grid;place-items:center;border-radius:50%;background:var(--eucalyptus);color:var(--paper);font:900 2.2vw/1 Arial,sans-serif}.copy-arrow.a{left:35.6%}.copy-arrow.b{left:64.4%}
.report{position:absolute;inset:10%;display:grid;grid-template-columns:1.2fr .8fr;gap:9%;align-items:center}.bars{height:72%;display:flex;align-items:end;gap:6%}.bar{flex:1;border-radius:1.4vw 1.4vw .5vw .5vw;background:var(--sage)}.bar:nth-child(1){height:32%;opacity:.5}.bar:nth-child(2){height:54%;opacity:.68}.bar:nth-child(3){height:72%;opacity:.84}.bar:nth-child(4){height:94%;background:var(--eucalyptus)}.clock{aspect-ratio:1;border:1.4vw solid var(--eucalyptus);border-radius:50%;position:relative}.clock::before{content:"";position:absolute;left:50%;top:20%;width:1vw;height:31%;transform-origin:50% 100%;background:var(--eucalyptus);border-radius:999px}.clock::after{content:"";position:absolute;left:49%;top:48%;width:30%;height:1vw;transform:rotate(26deg);transform-origin:left center;background:var(--eucalyptus);border-radius:999px}
.handoff{position:absolute;inset:10%}.path{position:absolute;left:5%;right:5%;top:50%;height:1vw;transform:translateY(-50%);border-radius:999px;background:linear-gradient(90deg,var(--sage),var(--eucalyptus))}.node{position:absolute;top:50%;width:8vw;height:8vw;transform:translate(-50%,-50%);border-radius:2vw;background:var(--paper);border:1px solid var(--line);box-shadow:0 1vw 3vw rgba(52,65,55,.1)}.node::before{content:"";position:absolute;inset:29%;border:.8vw solid var(--eucalyptus);border-radius:50%}.node:nth-child(2){left:8%}.node:nth-child(3){left:36%}.node:nth-child(4){left:64%}.node:nth-child(5){left:92%}.handoff .pulse{position:absolute;left:36%;top:50%;width:13vw;height:13vw;transform:translate(-50%,-50%);border:1vw solid rgba(88,118,100,.18);border-radius:50%}
.growth{position:absolute;inset:10%;display:grid;grid-template-columns:1fr 10% 1fr;align-items:center}.scatter{position:relative;height:70%}.scatter i,.ordered i{display:block;border-radius:1.3vw;background:var(--eucalyptus)}.scatter i{position:absolute;width:8vw;height:8vw}.scatter i:nth-child(1){left:6%;top:7%;transform:rotate(-12deg);opacity:.45}.scatter i:nth-child(2){right:10%;top:17%;transform:rotate(8deg);opacity:.62}.scatter i:nth-child(3){left:24%;bottom:10%;transform:rotate(15deg);opacity:.78}.scatter i:nth-child(4){right:3%;bottom:0;background:var(--moss)}.growth-arrow{display:grid;place-items:center;width:6vw;height:6vw;border-radius:50%;background:var(--moss);color:var(--paper);font:900 2.4vw/1 Arial,sans-serif}.ordered{display:grid;grid-template-columns:repeat(2,1fr);gap:2vw}.ordered i{aspect-ratio:1}.ordered i:nth-child(2),.ordered i:nth-child(3){opacity:.65}
.tools{position:absolute;inset:9%}.tool-hub{position:absolute;left:50%;top:50%;width:15vw;height:15vw;transform:translate(-50%,-50%);border-radius:3vw;background:var(--eucalyptus);box-shadow:0 0 0 2vw rgba(88,118,100,.13)}.tool-hub::before{content:"";position:absolute;inset:31%;border:.9vw solid var(--paper);border-radius:50%}.tool{position:absolute;width:9vw;height:9vw;border-radius:2.2vw;background:var(--paper);border:1px solid var(--line);box-shadow:0 1vw 3vw rgba(52,65,55,.08)}.tool::before{content:"";position:absolute;inset:30%;border:.8vw solid var(--sage);border-radius:1vw}.tool:nth-child(2){left:5%;top:7%}.tool:nth-child(3){right:5%;top:7%}.tool:nth-child(4){left:5%;bottom:7%}.tool:nth-child(5){right:5%;bottom:7%}.tool-line{position:absolute;left:50%;top:50%;width:36%;height:.5vw;background:rgba(88,118,100,.45);transform-origin:left center}.tool-line.a{transform:rotate(-148deg)}.tool-line.b{transform:rotate(-32deg)}.tool-line.c{transform:rotate(148deg)}.tool-line.d{transform:rotate(32deg)}
.opportunities{position:absolute;inset:9%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:3%}.opportunity{border-radius:2vw;background:rgba(251,248,241,.74);border:1px solid var(--line);position:relative}.opportunity::before{content:"";position:absolute;left:14%;right:14%;top:32%;height:.8vw;border-radius:999px;background:rgba(52,65,55,.14);box-shadow:0 2vw 0 rgba(52,65,55,.09)}.opportunity.selected{background:var(--eucalyptus);transform:scale(1.06);box-shadow:0 0 0 1.3vw rgba(88,118,100,.13)}.opportunity.selected::before{background:var(--paper);box-shadow:0 2vw 0 rgba(251,248,241,.55)}
</style>
</head>
<body>
<main id="post"></main>
<script>
const posts={
  fomo:{index:'01',tone:'dark',headline:'IS AI LEAVING YOU BEHIND?',visual:'<div class="lane one"></div><div class="lane two"></div><div class="lane three"></div><i class="runner a"></i><i class="runner b"></i><i class="runner c"></i>'},
  staff:{index:'02',tone:'light',headline:'YOUR TEAM IS STUCK DOING ADMIN',visual:'<div class="capacity"><div class="task-stack"><i class="task"></i><i class="task"></i><i class="task"></i></div><div class="focus"></div></div>'},
  followup:{index:'03',tone:'sage',headline:'SLOW FOLLOW-UP LOSES GOOD LEADS',visual:'<div class="timeline"><i class="time-dot"></i><i class="time-dot"></i><i class="time-dot"></i><i class="time-dot"></i></div>'},
  crm:{index:'04',tone:'light',headline:'YOUR CRM SHOULD DO THE CHASING',visual:'<div class="orbit"><i class="orbit-arrow">↻</i></div><div class="crm-hub"></div>'},
  copying:{index:'05',tone:'dark',headline:'STOP COPYING DATA BETWEEN SYSTEMS',visual:'<div class="systems"><i class="system"></i><i class="system"></i><i class="system"></i><b class="copy-arrow a">→</b><b class="copy-arrow b">→</b></div>'},
  reporting:{index:'06',tone:'light',headline:'REPORTING SHOULD NOT TAKE ALL DAY',visual:'<div class="report"><div class="bars"><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i></div><div class="clock"></div></div>'},
  between:{index:'07',tone:'sage',headline:'AUTOMATE THE WORK BETWEEN THE WORK',visual:'<div class="handoff"><div class="path"></div><i class="node"></i><i class="node"></i><i class="node"></i><i class="node"></i><i class="pulse"></i></div>'},
  growth:{index:'08',tone:'light',headline:'GROWING BUSINESSES NEED BETTER SYSTEMS',visual:'<div class="growth"><div class="scatter"><i></i><i></i><i></i><i></i></div><b class="growth-arrow">→</b><div class="ordered"><i></i><i></i><i></i><i></i></div></div>'},
  tools:{index:'09',tone:'dark',headline:'YOU MAY ALREADY HAVE THE TOOLS',visual:'<div class="tools"><i class="tool-hub"></i><i class="tool"></i><i class="tool"></i><i class="tool"></i><i class="tool"></i><b class="tool-line a"></b><b class="tool-line b"></b><b class="tool-line c"></b><b class="tool-line d"></b></div>'},
  first:{index:'10',tone:'sage',headline:'FIND YOUR FIRST USEFUL AUTOMATION',visual:'<div class="opportunities"><i class="opportunity"></i><i class="opportunity selected"></i><i class="opportunity"></i><i class="opportunity"></i><i class="opportunity"></i><i class="opportunity"></i></div>'}
};
const key=new URLSearchParams(location.search).get('post')||'fomo';
const item=posts[key]||posts.fomo;
const words=item.headline.trim().split(/\s+/).length;
if(words>7)throw new Error('Artwork headline exceeds seven words');
document.getElementById('post').className=`post ${item.tone}`;
document.getElementById('post').innerHTML=`<div class="top"><span class="mark">RL</span><span class="index">${item.index}/10</span></div><div class="headline">${item.headline}</div><div class="visual">${item.visual}</div>`;
</script>
</body>
</html>
